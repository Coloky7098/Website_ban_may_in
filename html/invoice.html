<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Hóa đơn VP</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        padding: 20px;
      }

      .vp-invoice {
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        overflow: hidden;
      }

      .vp-invoice-header {
        background: #f8fafc;
        padding: 1rem 1.25rem;
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid #e2e8f0;
      }

      .vp-invoice-row {
        display: flex;
        justify-content: space-between;
        padding: 7px 1.25rem;
        font-size: 0.85rem;
      }

      .vp-invoice-row:nth-child(odd) {
        background: #f8fafc;
      }

      .vp-invoice-total-row {
        display: flex;
        justify-content: space-between;
        padding: 12px 1.25rem;
        background: #e6f0ff;
        border-top: 2px solid #b3c5ff;
        font-weight: 800;
        color: #0066ff;
      }
    </style>
  </head>

  <body>
    <div id="invoiceContainer"></div>

    <script>
      const data = localStorage.getItem("invoice_html");

      if (data) {
        document.getElementById("invoiceContainer").innerHTML = data;
      }

      setTimeout(() => {
        window.print();
      }, 400);
    </script>
  </body>
</html>
